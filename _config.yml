---
title: "RHIS Architecture"
brand_title: "RHIS"
eyebrow: "Red Hat Infrastructure Standard Documentation"
brand_tagline: >-
  Multi-cloud enterprise infrastructure deployment platform with
  hermetic packaging, identity-first design, and lifecycle automation.
description: >-
  Comprehensive architecture documentation for RHIS (Red Hat Infrastructure Standard),
  covering deployment across AWS, Azure, GCP, KVM, and bare metal with
  integrated identity management, universal provisioning, and complete lifecycle management.
url: "https://parmstro.github.io"
baseurl: "/rhis-architecture"
repo_url: "https://github.com/parmstro/rhis-architecture"

# Theme
theme: jekyll-theme-primer

# Plugins
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-relative-links
  - jekyll-optional-front-matter
  - jekyll-titles-from-headings

# Markdown
markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  auto_ids: true

# Configuration
relative_links:
  enabled: true
  collections: false

optional_front_matter:
  remove_originals: false

titles_from_headings:
  enabled: true
  strip_title: true
  collections: false

# GitHub metadata
repository: parmstro/rhis-architecture

# Exclude from processing
exclude:
  - .git
  - .gitignore
  - scripts/
  - vendor/
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - "*.sh"
  - repos/

# Include
include:
  - _config.yml
  - diagrams/
